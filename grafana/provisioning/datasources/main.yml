apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: analytics
    user: user
    secureJsonData:
      password: "password"
    jsonData:
      sslmode: "disable"
      maxOpenConns: 20
      maxIdleConns: 5
      connMaxLifetime: 14400
    editable: false